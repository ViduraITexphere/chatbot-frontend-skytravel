<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap");

      body {
        font-family: "DM Sans", sans-serif;
        overflow: hidden; /* Prevent scrolling */
        margin: 0; /* Reset default margin */
        padding: 0; /* Reset default padding */
      }

      #chatbot-container {
        width: 100%;
        box-sizing: border-box;
        background-size: cover;
        background-repeat: no-repeat;
        border-radius: 8px;
        text-align: center; /* Center text */
      }

      #container-wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px;
        background-color: rgb(255, 255, 255);
        border-radius: 10px;
        position: relative;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        height: 250px;
      }
      /* Custom scrollbar styles */
      #chat-history::-webkit-scrollbar {
        width: 6px; /* Set the width of the scrollbar */
      }

      #chat-history::-webkit-scrollbar-thumb {
        background-color: rgba(
          0,
          0,
          0,
          0.5
        ); /* Set the color of the scrollbar thumb */
        border-radius: 5px; /* Set the border radius of the thumb */
      }

      .bot-message,
      .user-message {
        border-radius: 10px;
        margin-bottom: 5px;
        font-size: 16px;
        width: 100%;
        padding: 10px;
        box-sizing: border-box; /* Include padding in width calculation */
      }

      .bot-message {
        background-color: #f8d8d8;
        text-align: left;
      }

      .user-message {
        background-color: #ebfdeb;
        text-align: right;
      }

      #chat-history {
        max-height: 70px; /* Set a max-height for scrolling */
        overflow-y: auto;
        margin-bottom: 10px;
        padding-right: 5px;
      }

      #chat-form {
        display: flex;
        justify-content: space-between; /* Space out input and button */
        align-items: center; /* Vertically center items */
      }

      input {
        flex: 1; /* Take remaining space */
        padding: 10px;
        font-size: 16px;
        border: solid 1px #e2e2e2; /* Example border */
        border-radius: 5px;
        margin-right: 10px;
        box-sizing: border-box; /* Include padding in width calculation */
      }

      ::placeholder {
        color: rgb(172, 172, 172);
        opacity: 1; /* Firefox */
      }
      .search-icon {
        filter: invert(100%) brightness(1000%);

      }
      input:focus {
      border-color: #fdd6b1; /* Change to the desired border color */
      outline: none; /* Remove the default outline */
}

      button {
        padding: 8px 20px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        background-color: #ef8d31; /* Example color */
        color: white; /* Text color */
        cursor: pointer;
      }

      #loader {
        display: none; /* Hide by default */
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      /* Typing animation */
      @keyframes typing {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }

      .typing-animation {
        display: inline-block;
        overflow: hidden;
      }

      .typing-animation span {
        display: inline-block;
        white-space: nowrap;
        overflow: hidden;
        /* animation: typing 1s steps(500, end) infinite;  */
        font-size: 24px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="chatbot-container">
        <div id="container-wrapper">
            <div class="typing-animation">
                <span>Ask Legal Experts</span>
            </div>
            <div id="chat-history"></div>
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Enter your message" />
                <button type="submit" class="search-btn">
                    <img class="search-icon" src="search.svg" width="20px" alt="Send" />
                </button>
            </form>
            <div id="loader">
                <img src="load.gif" width="50px" alt="Loading..." />
            </div>
        </div>
    </div>

    <script>
        // Function to format bot messages into numbered points with bold headings for specific sections
        function formatBotMessage(botMessage) {
            // Split the message by the double asterisk '**'
            const sections = botMessage.split('**').map(section => section.trim()).filter(Boolean);

            // Initialize an array to hold formatted sections
            const formattedSections = [];

            sections.forEach((section, index) => {
                // If the section is not the first one, prepend an ordered list item
                if (index > 0) {
                    // Use the first line as the main topic and the rest as sub-items
                    const lines = section.split('\n').filter(line => line.trim() !== '');

                    // Create a bold heading for the section
                    const mainTopic = `<strong>${lines[0]}</strong>`; // Make the first line a bold heading

                    // Format the remaining lines as sub-items
                    const subItems = lines.slice(1).map(subItem => `<li>${subItem.trim()}</li>`).join('');

                    // Push the formatted section into the array
                    formattedSections.push(`<li>${mainTopic}<ul>${subItems}</ul></li>`);
                } else {
                    // For the first section, treat it as a plain paragraph (not numbered)
                    formattedSections.push(section.trim());
                }
            });

            // Return formatted output: combining plain text with an ordered list
            return `<p>${formattedSections[0]}</p><ol>${formattedSections.slice(1).join('')}</ol>`;
        }

        const chatHistory = document.getElementById("chat-history");
        const userInput = document.getElementById("user-input");
        const form = document.getElementById("chat-form");

        async function sendMessage() {
            const userMessage = userInput.value;
            userInput.value = ""; // Clear input field
            try {
                const queryString = window.location.search;
                const urlParams = new URLSearchParams(queryString);
                const objectId = urlParams.get("objectId");

                const response = await fetch(
                    `https://chatbot-backend-2.onrender.com/chat-history/${objectId}`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({ userInput: userMessage }),
                    }
                );

                const data = await response.json();
                let botMessage = data.response;

                // Format sections into numbered points with bold headings
                botMessage = formatBotMessage(botMessage);

                // Add the user and bot messages to the chat history
                chatHistory.innerHTML += `<div class="user-message">${userMessage}</div>`;
                chatHistory.innerHTML += `<div class="bot-message">${botMessage}</div>`;

                // Scroll to the bottom of the chat history
                chatHistory.scrollTop = chatHistory.scrollHeight;
            } catch (error) {
                console.error("Error:", error);
            }
        }

        form.addEventListener("submit", (event) => {
            event.preventDefault(); // Prevent form submission
            const loader = document.getElementById("loader");
            loader.style.display = "block"; // Show the loader
            sendMessage().finally(() => {
                loader.style.display = "none"; // Hide the loader after the message is sent
            });
        });
    </script>
</body>

</html>
