<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap");

      body {
        font-family: "DM Sans", sans-serif;
        overflow: hidden;
        margin: 0;
        padding: 0;
      }

      #chatbot-container {
        width: 100%;
        box-sizing: border-box;
        background-size: cover;
        background-repeat: no-repeat;
        border-radius: 8px;
        text-align: center;
        height: 250px;
        position: relative;
        z-index: 9999;
      }

      #container-wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px;
        background-color: #fff;
        border-radius: 10px;
        position: relative;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      #popup {
        display: none;
        position: fixed;
        top: 20%;
        left: 50%;
        transform: translate(-50%, -20%);
        width: 400px;
        max-width: 90%;
        background-color: #fff;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        z-index: 9999;
        border-radius: 10px;
        padding: 20px;
        box-sizing: border-box;
      }

      #popup .close-btn {
        background-color: red;
        color: white;
        padding: 5px 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      /* Custom scrollbar styles */
      #chat-history::-webkit-scrollbar {
        width: 6px;
      }

      #chat-history::-webkit-scrollbar-thumb {
        background-color: rgba(0, 0, 0, 0.5);
        border-radius: 5px;
      }

      .bot-message,
      .user-message {
        border-radius: 10px;
        margin-bottom: 5px;
        font-size: 16px;
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
      }

      .bot-message {
        background-color: #f8d8d8;
        text-align: left;
      }

      .user-message {
        background-color: #ebfdeb;
        text-align: right;
      }

      #chat-history {
        max-height: 100px;
        overflow-y: auto;
        margin-bottom: 10px;
        padding-right: 5px;
      }

      #chat-form {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
        border: solid 1px #e2e2e2;
        border-radius: 5px;
        margin-right: 10px;
        box-sizing: border-box;
      }

      ::placeholder {
        color: rgb(172, 172, 172);
        opacity: 1;
      }

      input:focus {
        border-color: #fdd6b1;
        outline: none;
      }

      button {
        padding: 8px 20px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        background-color: #ef8d31;
        color: white;
        cursor: pointer;
      }

      #loader {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .search-icon {
        filter: invert(100%) brightness(1000%);
      }
    </style>
  </head>
  <body>
    <div id="chatbot-container">
      <div id="container-wrapper">
        <div class="typing-animation">
          <span>Ask Travel Experts</span>
        </div>
        <div id="chat-history"></div>
        <form id="chat-form">
          <input type="text" id="user-input" placeholder="Enter your message" />
          <button type="submit" class="search-btn">
            <img class="search-icon" src="search.svg" width="20px" alt="Send" />
          </button>
        </form>
      </div>
    </div>

    <!-- Chat Popup -->
    <div id="popup">
      <button class="close-btn">Close</button>
      <div id="container-wrapper">
        <div id="chat-history-popup"></div>
        <form id="chat-form-popup">
          <input type="text" id="user-input-popup" placeholder="Ask your question" />
          <button type="submit">Send</button>
        </form>
      </div>
      <div id="popup-loader">
        <img src="load.gif" width="50px" alt="Loading..." />
      </div>
    </div>

    <script>
      const chatHistory = document.getElementById("chat-history");
      const userInput = document.getElementById("user-input");
      const form = document.getElementById("chat-form");

      const popup = document.getElementById("popup");
      const popupForm = document.getElementById("chat-form-popup");
      const popupHistory = document.getElementById("chat-history-popup");
      const popupLoader = document.getElementById("popup-loader");

      let lastUserMessage = ""; // To store the last question asked in the main chatbot

      // Main chatbot form submit
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        lastUserMessage = userInput.value; // Capture the last user message
        openPopup(lastUserMessage); // Pass the question to popup
      });

      // Close popup
      document.querySelector(".close-btn").addEventListener("click", () => {
        popup.style.display = "none";
      });

      // Function to open popup and continue the conversation
      function openPopup(initialMessage) {
        popup.style.display = "block";
        popupHistory.innerHTML = `<div class="user-message">${initialMessage}</div>`; // Show initial user message
        getBotResponse(initialMessage, popupHistory, popupLoader); // Fetch the bot's response
      }

      // Fetch bot response and continue conversation
      // Fetch bot response and continue conversation
async function getBotResponse(userMessage, chatHistoryElement, loaderElement) {
  try {
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const objectId = urlParams.get("objectId");

    loaderElement.style.display = "block"; // Show loader

    // Make API request
    const response = await fetch(
      `https://chatbot-backend-2.onrender.com/chat-history/${objectId}`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ userInput: userMessage }),
      }
    );

    const data = await response.json();
    console.log("API Response:", data); // Debugging: Log the response

    // Check if the response contains the 'response' field
    if (data && data.response) {
      const botMessage = formatBotMessage(data.response);
      chatHistoryElement.innerHTML += `<div class="bot-message">${data.response}</div>`;

    } else {
      console.error("Empty or invalid response from API:", data);
      chatHistoryElement.innerHTML += `<div class="bot-message">Sorry, something went wrong. Please try again.</div>`;
    }

    chatHistoryElement.scrollTop = chatHistoryElement.scrollHeight;
  } catch (error) {
    console.error("Error:", error);
    chatHistoryElement.innerHTML += `<div class="bot-message">Error fetching the response. Please try again later.</div>`;
  } finally {
    loaderElement.style.display = "none"; // Hide loader
  }
}

      // Submit the form from the popup for a follow-up question
      popupForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const popupUserMessage = document.getElementById("user-input-popup").value;
        popupHistory.innerHTML += `<div class="user-message">${popupUserMessage}</div>`;
        getBotResponse(popupUserMessage, popupHistory, popupLoader); // Fetch response for the follow-up question
      });

      // Helper function to format bot messages
      function formatBotMessage(botMessage) {
        const sections = botMessage.split('**').map(section => section.trim()).filter(Boolean);
        const formattedSections = [];

        sections.forEach((section, index) => {
          if (index > 0) {
            const lines = section.split('\n').filter(line => line.trim() !== '');
            const mainTopic = `<strong>${lines[0]}</strong>`;
            const subtopics = lines.slice(1).map(line => `<p>${line}</p>`).join('');
            formattedSections.push(`${mainTopic}${subtopics}`);
          }
        });

        return formattedSections.join('');
      }
    </script>
  </body>
</html>
