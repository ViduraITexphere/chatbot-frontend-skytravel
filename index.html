<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap");

      body {
        font-family: "DM Sans", sans-serif;
        overflow: hidden;
        margin: 0;
        padding: 0;
      }

      #chatbot-container {
        width: 100%;
        box-sizing: border-box;
        background-size: cover;
        background-repeat: no-repeat;
        border-radius: 8px;
        text-align: center;
        height: 250px;
      }

      #container-wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px;
        background-color: #fff;
        border-radius: 10px;
        position: relative;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      #popup {
        display: none; /* Hide initially */
        position: fixed;
        top: 20%;
        left: 50%;
        transform: translate(-50%, -20%);
        width: 400px;
        max-width: 90%;
        background-color: #fff;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        z-index: 9999;
        border-radius: 10px;
        padding: 20px;
        box-sizing: border-box;
      }

      #popup .close-btn {
        background-color: red;
        color: white;
        padding: 5px 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      /* Custom scrollbar styles */
      #chat-history::-webkit-scrollbar {
        width: 6px;
      }

      #chat-history::-webkit-scrollbar-thumb {
        background-color: rgba(0, 0, 0, 0.5);
        border-radius: 5px;
      }

      .bot-message,
      .user-message {
        border-radius: 10px;
        margin-bottom: 5px;
        font-size: 16px;
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
      }

      .bot-message {
        background-color: #f8d8d8;
        text-align: left;
      }

      .user-message {
        background-color: #ebfdeb;
        text-align: right;
      }

      #chat-history {
        max-height: 100px;
        overflow-y: auto;
        margin-bottom: 10px;
        padding-right: 5px;
      }

      #chat-form {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
        border: solid 1px #e2e2e2;
        border-radius: 5px;
        margin-right: 10px;
        box-sizing: border-box;
      }

      ::placeholder {
        color: rgb(172, 172, 172);
        opacity: 1;
      }

      input:focus {
        border-color: #fdd6b1;
        outline: none;
      }

      button {
        padding: 8px 20px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        background-color: #ef8d31;
        color: white;
        cursor: pointer;
      }

      #loader {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .search-icon {
        filter: invert(100%) brightness(1000%);
      }
    </style>
  </head>
  <body>
    <div id="chatbot-container">
      <div id="container-wrapper">
        <div class="typing-animation">
          <span>Ask Travel Experts</span>
        </div>
        <div id="chat-history"></div>
        <form id="chat-form">
          <input type="text" id="user-input" placeholder="Enter your message" />
          <button type="submit" class="search-btn">
            <img class="search-icon" src="search.svg" width="20px" alt="Send" />
          </button>
        </form>
      </div>
    </div>

    <!-- Chat Popup -->
    <div id="popup">
      <button class="close-btn">Close</button>
      <div id="container-wrapper">
        <div id="chat-history-popup"></div>
        <form id="chat-form-popup">
          <input type="text" id="user-input-popup" placeholder="Ask your question" />
          <button type="submit">Send</button>
        </form>
      </div>
      <div id="popup-loader">
        <img src="load.gif" width="50px" alt="Loading..." />
      </div>
    </div>

    <script>
      const chatHistory = document.getElementById("chat-history");
      const userInput = document.getElementById("user-input");
      const form = document.getElementById("chat-form");

      const popup = document.getElementById("popup");
      const popupForm = document.getElementById("chat-form-popup");
      const popupHistory = document.getElementById("chat-history-popup");
      const popupLoader = document.getElementById("popup-loader");

      // Open popup when user submits question
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        openPopup();
      });

      // Close popup
      document.querySelector(".close-btn").addEventListener("click", () => {
        popup.style.display = "none";
      });

      async function sendMessage(container, input, loader, chatHistory) {
        const userMessage = input.value;
        input.value = ""; // Clear input field
        try {
          const queryString = window.location.search;
          const urlParams = new URLSearchParams(queryString);
          const objectId = urlParams.get("objectId");

          loader.style.display = "block"; // Show loader
          const response = await fetch(
            `https://chatbot-backend-2.onrender.com/chat-history/${objectId}`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ userInput: userMessage }),
            }
          );

          const data = await response.json();
          let botMessage = formatBotMessage(data.response);

          chatHistory.innerHTML += `<div class="user-message">${userMessage}</div>`;
          chatHistory.innerHTML += `<div class="bot-message">${botMessage}</div>`;

          chatHistory.scrollTop = chatHistory.scrollHeight;
        } catch (error) {
          console.error("Error:", error);
        } finally {
          loader.style.display = "none"; // Hide loader
        }
      }

      function openPopup() {
        popup.style.display = "block";
      }

      popupForm.addEventListener("submit", (event) => {
        event.preventDefault();
        sendMessage(popup, document.getElementById("user-input-popup"), popupLoader, popupHistory);
      });

      function formatBotMessage(botMessage) {
        const sections = botMessage.split('**').map(section => section.trim()).filter(Boolean);
        const formattedSections = [];

        sections.forEach((section, index) => {
          if (index > 0) {
            const lines = section.split('\n').filter(line => line.trim() !== '');
            const mainTopic = `<strong>${lines[0]}</strong>`;
            const subItems = lines.slice(1).map(subItem => `<li>${subItem.trim()}</li>`).join('');
            formattedSections.push(`<li>${mainTopic}<ul>${subItems}</ul></li>`);
          } else {
            formattedSections.push(section.trim());
          }
        });

        return `<p>${formattedSections[0]}</p><ol>${formattedSections.slice(1).join('')}</ol>`;
      }
    </script>
  </body>
</html>
