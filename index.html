<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Chatbot</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap");

      body {
        font-family: "DM Sans", sans-serif;
        overflow: hidden; /* Prevent scrolling */
        margin: 0; /* Reset default margin */
        padding: 0; /* Reset default padding */
      }

      #chatbot-container {
        width: 100%;
        box-sizing: border-box;
        background-size: cover;
        background-repeat: no-repeat;
        border-radius: 8px;
        text-align: center; /* Center text */
        height: 250px;
      }

      #container-wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px;
        background-color: rgb(255, 255, 255);
        border-radius: 10px;
        position: relative;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      .bot-message,
      .user-message {
        border-radius: 10px;
        margin-bottom: 5px;
        font-size: 16px;
        width: 100%;
        padding: 10px;
        box-sizing: border-box; /* Include padding in width calculation */
      }

      .bot-message {
        background-color: #f8d8d8;
        text-align: left;
      }

      .user-message {
        background-color: #ebfdeb;
        text-align: right;
      }

      #chat-history {
        max-height: 70px; /* Set a max-height for scrolling */
        overflow-y: auto;
        margin-bottom: 10px;
        padding-right: 5px;
      }

      #chat-form {
        display: flex;
        justify-content: space-between; /* Space out input and button */
        align-items: center; /* Vertically center items */
      }

      input {
        flex: 1; /* Take remaining space */
        padding: 10px;
        font-size: 16px;
        border: solid 1px #e2e2e2; /* Example border */
        border-radius: 5px;
        margin-right: 10px;
        box-sizing: border-box; /* Include padding in width calculation */
      }

      ::placeholder {
        color: rgb(172, 172, 172);
        opacity: 1; /* Firefox */
      }

      .search-icon {
        filter: invert(100%) brightness(1000%);
      }

      input:focus {
        border-color: #fdd6b1; /* Change to the desired border color */
        outline: none; /* Remove the default outline */
      }

      button {
        padding: 8px 20px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        background-color: #ef8d31; /* Example color */
        color: white; /* Text color */
        cursor: pointer;
      }

      #loader {
        display: none; /* Hide by default */
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      /* Modal popup styling */
      #chatbot-popup {
        display: none; /* Hidden by default */
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80%;
        max-width: 600px;
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        z-index: 1000;
        padding: 20px;
      }

      /* Overlay background for the popup */
      #popup-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 999;
      }

      /* Close button inside popup */
      .close-btn {
        float: right;
        cursor: pointer;
        color: #aaa;
        font-size: 24px;
      }

      .close-btn:hover {
        color: #000;
      }
    </style>
  </head>
  <body>
    <!-- Initial Chatbot Container -->
    <div id="chatbot-container">
      <div id="container-wrapper">
        <div class="typing-animation">
          <span>Ask Travel Experts</span>
        </div>
        <div id="chat-history"></div>
        <form id="chat-form">
          <input type="text" id="user-input" placeholder="Enter your message" />
          <button type="submit" class="search-btn">
            <img class="search-icon" src="search.svg" width="20px" alt="Send" />
          </button>
        </form>
        <div id="loader">
          <img src="load.gif" width="50px" alt="Loading..." />
        </div>
      </div>
    </div>

    <!-- Modal Popup for Chatbot -->
    <div id="popup-overlay"></div>
    <div id="chatbot-popup">
      <span class="close-btn" id="close-popup">&times;</span>
      <div id="popup-chat-history"></div>
      <form id="popup-chat-form">
        <input type="text" id="popup-user-input" placeholder="Enter your message" />
        <button type="submit" class="search-btn">
          <img class="search-icon" src="search.svg" width="20px" alt="Send" />
        </button>
      </form>
      <div id="popup-loader">
        <img src="load.gif" width="50px" alt="Loading..." />
      </div>
    </div>

    <script>
      const chatbotPopup = document.getElementById("chatbot-popup");
      const popupOverlay = document.getElementById("popup-overlay");
      const closePopup = document.getElementById("close-popup");
      const popupChatHistory = document.getElementById("popup-chat-history");
      const popupUserInput = document.getElementById("popup-user-input");
      const popupForm = document.getElementById("popup-chat-form");

      // Function to format bot messages
      function formatBotMessage(botMessage) {
        const sections = botMessage.split('**').map(section => section.trim()).filter(Boolean);
        const formattedSections = [];
        sections.forEach((section, index) => {
          if (index > 0) {
            const lines = section.split('\n').filter(line => line.trim() !== '');
            const mainTopic = `<strong>${lines[0]}</strong>`;
            const subItems = lines.slice(1).map(subItem => `<li>${subItem.trim()}</li>`).join('');
            formattedSections.push(`<li>${mainTopic}<ul>${subItems}</ul></li>`);
          } else {
            formattedSections.push(section.trim());
          }
        });
        return `<p>${formattedSections[0]}</p><ol>${formattedSections.slice(1).join('')}</ol>`;
      }

      // Open the popup
      function openPopup() {
        popupOverlay.style.display = "block";
        chatbotPopup.style.display = "block";
      }

      // Close the popup
      closePopup.addEventListener("click", function () {
        popupOverlay.style.display = "none";
        chatbotPopup.style.display = "none";
      });

      async function sendMessageInPopup() {
        const userMessage = popupUserInput.value;
        popupUserInput.value = ""; // Clear input field
        try {
          const queryString = window.location.search;
          const urlParams = new URLSearchParams(queryString);
          const objectId = urlParams.get("objectId");

          const response = await fetch(
            `https://chatbot-backend-2.onrender.com/chat-history/${objectId}`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ userInput: userMessage }),
            }
          );

          const data = await response.json();
          let botMessage = data.response;
          botMessage = formatBotMessage(botMessage);

          popupChatHistory.innerHTML += `<div class="user-message">${userMessage}</div>`;
          popupChatHistory.innerHTML += `<div class="bot-message">${botMessage}</div>`;

          popupChatHistory.scrollTop = popupChatHistory.scrollHeight;
        } catch (error) {
          console.error("Error:", error);
        }
      }

      // Open the popup when the form in the main chatbot is submitted
      const chatForm = document.getElementById("chat-form");
      chatForm.addEventListener("submit", function (event) {
        event.preventDefault();
        openPopup();
      });

      // Handle submission of the popup chat form
      popupForm.addEventListener("submit", function (event) {
        event.preventDefault();
        sendMessageInPopup();
      });
    </script>
  </body>
</html>
